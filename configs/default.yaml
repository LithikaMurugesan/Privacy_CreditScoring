"""
configs/default.yaml
====================
Default hyperparameter configuration for the FL Credit Scoring system.

All parts of the system (FLEngine, Streamlit dashboard, CLI, API) read
from this file via load_config(). Override values by creating a copy
and passing --config path/to/config.yaml to run_experiment.py.
"""

# ── Banks ──────────────────────────────────────────────────────────────────
banks:
  - SBI
  - HDFC
  - Axis
  - PNB
  - ICICI

# ── Federated Learning ─────────────────────────────────────────────────────
fl:
  num_rounds:   8
  local_epochs: 2
  lr:           0.001
  batch_size:   64
  backend:      custom        # "flower" or "custom"

# ── Differential Privacy ───────────────────────────────────────────────────
dp:
  enabled:          true
  backend:          custom    # "opacus" or "custom" or "none"
  noise_multiplier: 1.1       # sigma — higher = more noise = more private
  max_grad_norm:    1.0       # C — gradient clipping norm
  delta:            0.00001   # target delta in (epsilon, delta)-DP

# ── FedProx ────────────────────────────────────────────────────────────────
fedprox:
  enabled: false
  mu:      0.01               # proximal coefficient — higher = tighter tether

# ── Model ─────────────────────────────────────────────────────────────────
model:
  input_dim: 10
  hidden:    [64, 32, 16]

# ── Experiment Tracking ────────────────────────────────────────────────────
experiment:
  save_results: true
  results_dir:  experiments/results
  save_model:   true
  model_path:   experiments/results/best_model.pt

# ── API ────────────────────────────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8000
